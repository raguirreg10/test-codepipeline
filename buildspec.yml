version: 0.2

phases:
  install:
    commands:
      - curl -fsSL https://rpm.nodesource.com/setup_24.x | bash -
      - yum install -y nodejs
      - node --version
      - npm --version
      - npm ci

  build:
    commands:
      - node --version
      - npm run build

artifacts:
  base-directory: dist
  files:
    - '**/*'